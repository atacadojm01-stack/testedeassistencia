<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SGT Diagnóstico PRO</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0e0e0e;
color:white;
text-align:center;
user-select:none;
}

header{
background:linear-gradient(135deg,#0066ff,#0044cc);
padding:16px;
font-size:20px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.5);
}

.container{
max-width:800px;
margin:auto;
padding:15px;
padding-bottom:60px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
background:linear-gradient(135deg,#0066ff,#0044cc);
color:white;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
}

button:active{
transform:scale(.97);
}

.section{
background:#1b1b1b;
padding:15px;
border-radius:12px;
margin-top:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.5);
}

.progress{
text-align:left;
font-size:14px;
line-height:22px;
}

.ok{color:#00ff88}
.fail{color:#ff4444}
.wait{color:#ffaa00}

video{
width:100%;
border-radius:10px;
background:black;
}

textarea{
width:100%;
height:200px;
background:#000;
color:#0f0;
padding:10px;
border:1px solid #333;
border-radius:6px;
font-family:monospace;
}

#touchOverlay{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
z-index:9999;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(16,1fr);
}

.touchCell{
border:1px solid #222;
background:#300;
touch-action:none;
}

.touchCell.active{
background:#0f0;
}

#closeTouchBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:red;
padding:15px 30px;
border-radius:20px;
font-weight:bold;
}

.micbar{
height:20px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

#micLevel{
height:100%;
background:#00ff88;
width:0%;
}

</style>
</head>

<body>

<header>SGT Diagnóstico PRO</header>

<div class="container">

<div class="section progress" id="progress"></div>

<div class="menu">

<button onclick="testeTela()">Tela</button>
<button onclick="testeTouch()">Touch</button>

<button onclick="testeCamera()">Câmera</button>
<button onclick="testeMicrofone()">Microfone</button>

<button onclick="testeSom()">Alto-falante</button>
<button onclick="testeVibracao()">Vibração</button>

<button onclick="testeSensores()">Sensores</button>
<button onclick="testeGPS()">GPS</button>

<button onclick="testeBateria()">Bateria</button>
<button onclick="infoDispositivo()">Hardware</button>

<button onclick="relatorio()">Relatório</button>

</div>

<div class="section" id="area">
Selecione um teste para iniciar
</div>

</div>

<div id="touchOverlay"></div>

<script>

const area=document.getElementById("area")
const progress=document.getElementById("progress")

let resultados={
tela:"wait",
touch:"wait",
camera:"wait",
mic:"wait",
som:"wait",
vibracao:"wait",
sensores:"wait",
gps:"wait",
bateria:"wait"
}

let stream=null
let audioContext=null
let animFrame=null

function atualizarBarra(){

let html=""

for(let k in resultados){

let status=resultados[k]

let label=k.toUpperCase()

if(status==="ok")
html+=`✔ ${label} <span class="ok">OK</span><br>`

else if(status==="fail")
html+=`✖ ${label} <span class="fail">Falha</span><br>`

else
html+=`⏳ ${label} <span class="wait">Pendente</span><br>`

}

progress.innerHTML=html
}

atualizarBarra()

function limpar(){

area.innerHTML=""

if(stream){
stream.getTracks().forEach(t=>t.stop())
stream=null
}

if(audioContext){
audioContext.close()
audioContext=null
}

if(animFrame){
cancelAnimationFrame(animFrame)
}

}

function voltar(){

area.innerHTML="Selecione outro teste"

}

function marcar(teste,status){

resultados[teste]=status
atualizarBarra()

}

function testeTela(){

limpar()

let cores=["white","black","red","green","blue"]

let html="<h3>Procure pixels mortos</h3>"

cores.forEach(c=>{

html+=`<button style="background:${c};color:${c=="white"?"black":"white"}"
onclick="document.body.style.background='${c}'">${c}</button>`

})

html+=`
<button onclick="document.body.style.background='#0e0e0e'">Restaurar</button>

<button onclick="marcar('tela','ok');voltar()">Tela OK</button>
<button onclick="marcar('tela','fail');voltar()">Falha</button>
`

area.innerHTML=html

}

function testeTouch(){

limpar()

const overlay=document.getElementById("touchOverlay")

overlay.innerHTML='<button id="closeTouchBtn" onclick="fecharTouch()">SAIR</button>'

overlay.style.display="grid"

for(let i=0;i<128;i++){

let d=document.createElement("div")
d.className="touchCell"
overlay.appendChild(d)

}

overlay.addEventListener("touchmove",handleTouch,{passive:false})

}

function handleTouch(e){

e.preventDefault()

for(let i=0;i<e.touches.length;i++){

let x=e.touches[i].clientX
let y=e.touches[i].clientY

let el=document.elementFromPoint(x,y)

if(el&&el.classList.contains("touchCell"))
el.classList.add("active")

}

}

function fecharTouch(){

const overlay=document.getElementById("touchOverlay")

overlay.style.display="none"

overlay.removeEventListener("touchmove",handleTouch)

area.innerHTML=`
<button onclick="marcar('touch','ok');voltar()">Touch OK</button>
<button onclick="marcar('touch','fail');voltar()">Falha</button>
`

}

async function testeCamera(){

limpar()

area.innerHTML=`
<video id="video" autoplay playsinline></video>

<button onclick="marcar('camera','ok');voltar()">Camera OK</button>
<button onclick="marcar('camera','fail');voltar()">Falha</button>
`

try{

stream=await navigator.mediaDevices.getUserMedia({video:true})

document.getElementById("video").srcObject=stream

}catch{

area.innerHTML="Erro câmera"

}

}

async function testeMicrofone(){

limpar()

area.innerHTML=`
<h3>Fale no microfone</h3>
<div class="micbar"><div id="micLevel"></div></div>

<button onclick="marcar('mic','ok');voltar()">Microfone OK</button>
<button onclick="marcar('mic','fail');voltar()">Falha</button>
`

stream=await navigator.mediaDevices.getUserMedia({audio:true})

audioContext=new AudioContext()

const source=audioContext.createMediaStreamSource(stream)

const analyser=audioContext.createAnalyser()

source.connect(analyser)

const data=new Uint8Array(analyser.frequencyBinCount)

function loop(){

analyser.getByteFrequencyData(data)

let soma=0

for(let i=0;i<data.length;i++) soma+=data[i]

let media=soma/data.length

document.getElementById("micLevel").style.width=(media/128*100)+"%"

animFrame=requestAnimationFrame(loop)

}

loop()

}

function testeSom(){

limpar()

area.innerHTML=`
<h3>Teste Som</h3>

<button onclick="tocar(440)">Som</button>

<button onclick="marcar('som','ok');voltar()">OK</button>
<button onclick="marcar('som','fail');voltar()">Falha</button>
`

}

function tocar(freq){

audioContext=new AudioContext()

let osc=audioContext.createOscillator()

osc.frequency.value=freq

osc.connect(audioContext.destination)

osc.start()

setTimeout(()=>{

osc.stop()
audioContext.close()

},1000)

}

function testeVibracao(){

limpar()

area.innerHTML=`
<h3>Vibração</h3>

<button onclick="navigator.vibrate(300)">Vibrar</button>

<button onclick="marcar('vibracao','ok');voltar()">OK</button>
<button onclick="marcar('vibracao','fail');voltar()">Falha</button>
`

}

function testeSensores(){

limpar()

area.innerHTML=`
<h3>Movimente o celular</h3>
<h2 id="sens"></h2>

<button onclick="marcar('sensores','ok');voltar()">OK</button>
<button onclick="marcar('sensores','fail');voltar()">Falha</button>
`

window.addEventListener("deviceorientation",e=>{

document.getElementById("sens").innerHTML=
`X ${Math.round(e.beta)}<br>Y ${Math.round(e.gamma)}<br>Z ${Math.round(e.alpha)}`

})

}

function testeGPS(){

limpar()

area.innerHTML="Buscando GPS..."

navigator.geolocation.getCurrentPosition(p=>{

area.innerHTML=`
Lat ${p.coords.latitude}<br>
Lon ${p.coords.longitude}<br>

<button onclick="marcar('gps','ok');voltar()">OK</button>
<button onclick="marcar('gps','fail');voltar()">Falha</button>
`

})

}

async function testeBateria(){

limpar()

if(!navigator.getBattery){

area.innerHTML="API bateria não suportada"
return

}

let b=await navigator.getBattery()

area.innerHTML=`
<h3>Bateria</h3>

Nível: ${Math.round(b.level*100)}%<br>
Carregando: ${b.charging}

<br><br>

<button onclick="marcar('bateria','ok');voltar()">OK</button>
<button onclick="marcar('bateria','fail');voltar()">Falha</button>
`

}

function infoDispositivo(){

limpar()

area.innerHTML=`
<h3>Hardware</h3>

RAM: ${navigator.deviceMemory||"?"} GB<br>
CPU: ${navigator.hardwareConcurrency||"?"} cores<br>

Plataforma:<br>
${navigator.platform}

<br><br>

UserAgent:<br>

${navigator.userAgent}

`

}

function relatorio(){

limpar()

let texto="=== RELATÓRIO SGT ===\n\n"

for(let k in resultados){

texto+=k.toUpperCase()+" : "+resultados[k]+"\n"

}

texto+=`\nData: ${new Date().toLocaleString()}\n`

area.innerHTML=`
<h3>Relatório</h3>

<textarea id="rep">${texto}</textarea>

<button onclick="copiar()">Copiar</button>
`

}

function copiar(){

let t=document.getElementById("rep")

t.select()

document.execCommand("copy")

alert("Copiado")

}

</script>

</body>
</html>
